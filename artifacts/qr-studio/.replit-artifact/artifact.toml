kind = "web"
previewPath = "/"
title = "QR Studio"
version = "1.0.0"
id = "artifacts/qr-studio"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 22422

[services.development]
run = "pnpm --filter @workspace/qr-studio run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/qr-studio", "run", "build" ]
publicDir = "artifacts/qr-studio/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "22422"
BASE_PATH = "/"
